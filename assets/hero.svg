<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Jakub Dąbkowski — Lead Data Engineer and Founder at JData Consulting. From data complexity to business clarity.">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2540"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4dd0e1" stop-opacity="0"/>
      <stop offset="20%" stop-color="#4dd0e1" stop-opacity="1"/>
      <stop offset="80%" stop-color="#4dd0e1" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4dd0e1" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4dd0e1" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>

  <!-- Decorative data flow lines (subtle, bottom right) -->
  <g opacity="0.25" stroke="#4dd0e1" stroke-width="1" fill="none">
    <path d="M 900 280 Q 1000 240, 1100 260 T 1280 230"/>
    <path d="M 900 290 Q 1020 260, 1140 280 T 1280 250"/>
    <path d="M 900 300 Q 1040 280, 1160 300 T 1280 270"/>
  </g>

  <!-- Decorative nodes -->
  <g fill="#4dd0e1" opacity="0.6">
    <circle cx="900" cy="280" r="3"/>
    <circle cx="1100" cy="260" r="3"/>
    <circle cx="1280" cy="230" r="3"/>
    <circle cx="900" cy="290" r="2"/>
    <circle cx="1140" cy="280" r="2"/>
    <circle cx="900" cy="300" r="2"/>
    <circle cx="1160" cy="300" r="2"/>
  </g>

  <!-- Accent line above name -->
  <rect x="80" y="88" width="200" height="2" fill="url(#accentLine)"/>

  <!-- Name -->
  <text x="80" y="150"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="56" font-weight="700" fill="#ffffff" letter-spacing="-1">
    Jakub Dąbkowski
  </text>

  <!-- Role -->
  <text x="80" y="192"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="600" fill="#4dd0e1" letter-spacing="0.5">
    Lead Data Engineer &amp; Founder · JData Consulting
  </text>

  <!-- Tagline -->
  <text x="80" y="230"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="18" font-weight="400" fill="#c5d4e3" font-style="italic">
    From data complexity to business clarity.
  </text>

  <!-- Stat row -->
  <text x="80" y="275"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="700" fill="#4dd0e1" letter-spacing="2">
    10 YEARS  ·  500M+ EVENTS / DAY  ·  $140K+ SAVED  ·  5 PLATFORMS SHIPPED
  </text>
</svg>
